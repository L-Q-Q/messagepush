<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Push - 消息推送系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab {
            flex: 1;
            padding: 12px 20px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .tab:hover {
            background: #e0e0e0;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }

        .content {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn-danger {
            background: #ef4444;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .list-item {
            padding: 15px;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-item:hover {
            background: #f9fafb;
        }

        .list-item-info {
            flex: 1;
        }

        .list-item-actions {
            display: flex;
            gap: 10px;
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-processing {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-failed {
            background: #fee2e2;
            color: #991b1b;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #6ee7b7;
        }

        .alert-error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📨 Message Push</h1>
            <p>云原生消息推送系统</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('groups')">群组管理</button>
            <button class="tab" onclick="switchTab('members')">成员管理</button>
            <button class="tab" onclick="switchTab('messages')">发送消息</button>
            <button class="tab" onclick="switchTab('logs')">推送日志</button>
        </div>

        <div class="content">
            <!-- 群组管理 -->
            <div id="groups" class="tab-content active">
                <h2>群组管理</h2>
                <div id="groupAlert"></div>
                
                <div class="form-group">
                    <label>群组名称</label>
                    <input type="text" id="groupName" placeholder="输入群组名称">
                </div>
                <div class="form-group">
                    <label>SMTP 服务器</label>
                    <input type="text" id="smtpServer" placeholder="smtp.example.com">
                </div>
                <div class="form-group">
                    <label>SMTP 端口</label>
                    <input type="number" id="smtpPort" placeholder="465" value="465">
                </div>
                <div class="form-group">
                    <label>SMTP 用户名</label>
                    <input type="text" id="smtpUsername" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>SMTP 密码</label>
                    <input type="password" id="smtpPassword" placeholder="密码">
                </div>
                <button class="btn" onclick="createGroup()">创建群组</button>

                <hr style="margin: 30px 0; border: none; border-top: 1px solid #e5e7eb;">

                <h3>群组列表</h3>
                <div id="groupsList"></div>
            </div>

            <!-- 成员管理 -->
            <div id="members" class="tab-content">
                <h2>成员管理</h2>
                <div id="memberAlert"></div>

                <div class="form-group">
                    <label>选择群组</label>
                    <select id="memberGroupSelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="">请先创建群组</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>成员邮箱</label>
                    <input type="email" id="memberEmail" placeholder="member@example.com">
                </div>
                <button class="btn" onclick="addMember()">添加成员</button>

                <hr style="margin: 30px 0; border: none; border-top: 1px solid #e5e7eb;">

                <h3>成员列表</h3>
                <div id="membersList"></div>
            </div>

            <!-- 发送消息 -->
            <div id="messages" class="tab-content">
                <h2>发送消息</h2>
                <div id="messageAlert"></div>

                <div class="form-group">
                    <label>选择群组</label>
                    <select id="messageGroupSelect" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px;">
                        <option value="">请先创建群组</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>消息主题</label>
                    <input type="text" id="messageSubject" placeholder="输入消息主题">
                </div>
                <div class="form-group">
                    <label>消息内容</label>
                    <textarea id="messageBody" placeholder="输入消息内容"></textarea>
                </div>
                <button class="btn" onclick="sendMessage()">发送消息</button>
            </div>

            <!-- 推送日志 -->
            <div id="logs" class="tab-content">
                <h2>推送日志</h2>
                <button class="btn" onclick="loadLogs()" style="margin-bottom: 20px;">刷新日志</button>
                <div id="logsList"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';

        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');

            // 加载对应数据
            if (tabName === 'groups') loadGroups();
            if (tabName === 'members') {
                loadGroupsForSelect();
                loadMembers();
            }
            if (tabName === 'messages') loadGroupsForSelect();
            if (tabName === 'logs') loadLogs();
        }

        // 显示提示信息
        function showAlert(elementId, message, type = 'success') {
            const alertDiv = document.getElementById(elementId);
            alertDiv.innerHTML = `<div class="alert alert-${type}">${message}</div>`;
            setTimeout(() => alertDiv.innerHTML = '', 3000);
        }

        // 创建群组
        async function createGroup() {
            const data = {
                name: document.getElementById('groupName').value,
                smtp_server: document.getElementById('smtpServer').value,
                smtp_port: parseInt(document.getElementById('smtpPort').value),
                smtp_username: document.getElementById('smtpUsername').value,
                smtp_password: document.getElementById('smtpPassword').value
            };

            try {
                const response = await fetch(`${API_BASE}/groups`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                if (result.code === 0) {
                    showAlert('groupAlert', '群组创建成功！');
                    document.getElementById('groupName').value = '';
                    document.getElementById('smtpServer').value = '';
                    document.getElementById('smtpPort').value = '465';
                    document.getElementById('smtpUsername').value = '';
                    document.getElementById('smtpPassword').value = '';
                    loadGroups();
                } else {
                    showAlert('groupAlert', '创建失败：' + result.message, 'error');
                }
            } catch (error) {
                showAlert('groupAlert', '网络错误：' + error.message, 'error');
            }
        }

        // 加载群组列表
        async function loadGroups() {
            const listDiv = document.getElementById('groupsList');
            listDiv.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/groups`);
                const result = await response.json();
                
                if (result.code === 0 && result.data && result.data.length > 0) {
                    listDiv.innerHTML = result.data.map(group => `
                        <div class="list-item">
                            <div class="list-item-info">
                                <strong>${group.name}</strong><br>
                                <small>服务器: ${group.smtp_server}:${group.smtp_port}</small>
                            </div>
                            <div class="list-item-actions">
                                <button class="btn btn-danger" onclick="deleteGroup(${group.id})">删除</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<div class="empty">暂无群组</div>';
                }
            } catch (error) {
                listDiv.innerHTML = '<div class="alert alert-error">加载失败：' + error.message + '</div>';
            }
        }

        // 删除群组
        async function deleteGroup(id) {
            if (!confirm('确定要删除这个群组吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/groups/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.code === 0) {
                    showAlert('groupAlert', '群组删除成功！');
                    loadGroups();
                } else {
                    showAlert('groupAlert', '删除失败：' + result.message, 'error');
                }
            } catch (error) {
                showAlert('groupAlert', '网络错误：' + error.message, 'error');
            }
        }

        // 加载群组到下拉框
        async function loadGroupsForSelect() {
            try {
                const response = await fetch(`${API_BASE}/groups`);
                const result = await response.json();
                
                if (result.code === 0 && result.data) {
                    const options = result.data.map(group => 
                        `<option value="${group.id}">${group.name}</option>`
                    ).join('');
                    document.getElementById('memberGroupSelect').innerHTML = 
                        '<option value="">选择群组</option>' + options;
                    document.getElementById('messageGroupSelect').innerHTML = 
                        '<option value="">选择群组</option>' + options;
                }
            } catch (error) {
                console.error('加载群组失败:', error);
            }
        }

        // 添加成员
        async function addMember() {
            const groupId = document.getElementById('memberGroupSelect').value;
            const email = document.getElementById('memberEmail').value;

            if (!groupId) {
                showAlert('memberAlert', '请选择群组', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/groups/${groupId}/members`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const result = await response.json();
                
                if (result.code === 0) {
                    showAlert('memberAlert', '成员添加成功！');
                    document.getElementById('memberEmail').value = '';
                    loadMembers();
                } else {
                    showAlert('memberAlert', '添加失败：' + result.message, 'error');
                }
            } catch (error) {
                showAlert('memberAlert', '网络错误：' + error.message, 'error');
            }
        }

        // 加载成员列表
        async function loadMembers() {
            const groupId = document.getElementById('memberGroupSelect').value;
            const listDiv = document.getElementById('membersList');

            if (!groupId) {
                listDiv.innerHTML = '<div class="empty">请先选择群组</div>';
                return;
            }

            listDiv.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/groups/${groupId}/members`);
                const result = await response.json();
                
                if (result.code === 0 && result.data && result.data.length > 0) {
                    listDiv.innerHTML = result.data.map(member => `
                        <div class="list-item">
                            <div class="list-item-info">
                                <strong>${member.email}</strong>
                            </div>
                            <div class="list-item-actions">
                                <button class="btn btn-danger" onclick="deleteMember(${member.id})">删除</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<div class="empty">该群组暂无成员</div>';
                }
            } catch (error) {
                listDiv.innerHTML = '<div class="alert alert-error">加载失败：' + error.message + '</div>';
            }
        }

        // 删除成员
        async function deleteMember(id) {
            if (!confirm('确定要删除这个成员吗？')) return;

            try {
                const response = await fetch(`${API_BASE}/members/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.code === 0) {
                    showAlert('memberAlert', '成员删除成功！');
                    loadMembers();
                } else {
                    showAlert('memberAlert', '删除失败：' + result.message, 'error');
                }
            } catch (error) {
                showAlert('memberAlert', '网络错误：' + error.message, 'error');
            }
        }

        // 发送消息
        async function sendMessage() {
            const groupId = document.getElementById('messageGroupSelect').value;
            const subject = document.getElementById('messageSubject').value;
            const body = document.getElementById('messageBody').value;

            if (!groupId) {
                showAlert('messageAlert', '请选择群组', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        group_id: parseInt(groupId),
                        subject,
                        body
                    })
                });
                const result = await response.json();
                
                if (result.code === 0) {
                    showAlert('messageAlert', '消息发送成功！正在后台推送...');
                    document.getElementById('messageSubject').value = '';
                    document.getElementById('messageBody').value = '';
                } else {
                    showAlert('messageAlert', '发送失败：' + result.message, 'error');
                }
            } catch (error) {
                showAlert('messageAlert', '网络错误：' + error.message, 'error');
            }
        }

        // 加载推送日志
        async function loadLogs() {
            const listDiv = document.getElementById('logsList');
            listDiv.innerHTML = '<div class="loading">加载中...</div>';

            try {
                const response = await fetch(`${API_BASE}/logs`);
                const result = await response.json();
                
                if (result.code === 0 && result.data && result.data.length > 0) {
                    listDiv.innerHTML = result.data.map(log => `
                        <div class="list-item">
                            <div class="list-item-info">
                                <strong>${log.recipient}</strong><br>
                                <small>消息ID: ${log.message_id} | ${new Date(log.created_at).toLocaleString()}</small>
                                ${log.error_message ? `<br><small style="color: #ef4444;">错误: ${log.error_message}</small>` : ''}
                            </div>
                            <div class="list-item-actions">
                                <span class="badge badge-${log.status}">${log.status}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listDiv.innerHTML = '<div class="empty">暂无推送日志</div>';
                }
            } catch (error) {
                listDiv.innerHTML = '<div class="alert alert-error">加载失败：' + error.message + '</div>';
            }
        }

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadGroups();
        });

        // 监听群组选择变化
        document.getElementById('memberGroupSelect').addEventListener('change', loadMembers);
    </script>
</body>
</html>
